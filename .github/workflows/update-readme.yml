name: Update README Image Gallery

on:
  workflow_dispatch:

  push:
    paths:
      - "img/**"
      - ".github/workflows/update-readme.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate image gallery
        run: |
          python3 <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          start = "<!-- IMAGE-GALLERY:START -->"
          end = "<!-- IMAGE-GALLERY:END -->"

          image_exts = {".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp"}

          img_dir = Path("img")
          img_dir.mkdir(exist_ok=True)

          images = sorted(
              p for p in img_dir.iterdir()
              if p.is_file() and p.suffix.lower() in image_exts
          )

          gallery = []
          for img in images:
              src = img.as_posix()
              gallery.append(f'<img src="{src}" width="300" alt="{img.name}">')

          new_section = start + "\n\n" + "\n\n".join(gallery) + "\n\n" + end

          if readme.exists():
              text = readme.read_text(encoding="utf-8")
          else:
              text = "# Image Gallery\n\n" + start + "\n" + end + "\n"

          if start not in text or end not in text:
              text += "\n\n" + start + "\n" + end + "\n"

          before = text.split(start)[0]
          after = text.split(end)[1]

          readme.write_text(before + new_section + after, encoding="utf-8")
          PY

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README image gallery"
          git push
